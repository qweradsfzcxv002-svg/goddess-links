<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080a0f; --surface: #0e1118; --card: #13161f; --border: #1e2333;
    --gold: #c9a84c; --gold-light: #f0cc7a; --gold-dim: rgba(201,168,76,0.15);
    --text: #e8e2d6; --muted: #6b7280; --white: #ffffff;
  }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Serif TC', serif; }
  body { display: flex; flex-direction: column; align-items: center; padding: 48px 20px 80px; position: relative; overflow-x: hidden; }
  body::before { content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 600px; height: 600px; background: radial-gradient(ellipse, rgba(201,168,76,0.08) 0%, transparent 70%); pointer-events: none; z-index: 0; }
  body::after { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .container { position: relative; z-index: 1; width: 100%; max-width: 480px; display: flex; flex-direction: column; align-items: center; }
  .avatar-wrap { position: relative; margin-bottom: 20px; animation: fadeDown 0.7s ease both; }
  .avatar-ring { width: 96px; height: 96px; border-radius: 50%; padding: 3px; background: linear-gradient(135deg, var(--gold), #8b6914, var(--gold-light)); box-shadow: 0 0 30px rgba(201,168,76,0.35); }
  .avatar-inner { width: 100%; height: 100%; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; font-size: 38px; border: 2px solid var(--bg); }
  .name { font-size: 26px; font-weight: 900; letter-spacing: 0.06em; background: linear-gradient(135deg, var(--gold-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-align: center; animation: fadeDown 0.7s 0.1s ease both; margin-bottom: 10px; }
  .bio { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.7; max-width: 320px; animation: fadeDown 0.7s 0.2s ease both; margin-bottom: 36px; }
  .bio .highlight { color: var(--gold); font-weight: 700; }
  .divider { width: 100%; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim), var(--border), var(--gold-dim), transparent); margin-bottom: 32px; animation: fadeIn 1s 0.3s ease both; }
  .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .link-card { display: flex; align-items: center; gap: 16px; padding: 16px 20px; border-radius: 14px; background: var(--card); border: 1px solid var(--border); text-decoration: none; color: var(--text); transition: all 0.25s ease; position: relative; overflow: hidden; opacity: 0; animation: slideUp 0.5s ease forwards; }
  .link-card:hover { transform: translateY(-2px); }
  .link-card.tiktok:hover { border-color: #69c9d0; box-shadow: 0 8px 30px rgba(105,201,208,0.15); }
  .link-card.instagram:hover { border-color: #e1306c; box-shadow: 0 8px 30px rgba(225,48,108,0.15); }
  .link-card.x:hover { border-color: #ffffff; box-shadow: 0 8px 30px rgba(255,255,255,0.1); }
  .link-card.facebook:hover { border-color: #1877f2; box-shadow: 0 8px 30px rgba(24,119,242,0.15); }
  .link-card.custom:hover { border-color: var(--gold); box-shadow: 0 8px 30px rgba(201,168,76,0.15); }
  .icon-wrap { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
  .tiktok .icon-wrap { background: rgba(105,201,208,0.1); }
  .instagram .icon-wrap { background: rgba(225,48,108,0.1); }
  .x .icon-wrap { background: rgba(255,255,255,0.07); }
  .facebook .icon-wrap { background: rgba(24,119,242,0.1); }
  .custom .icon-wrap { background: var(--gold-dim); }
  .link-info { flex: 1; }
  .link-platform { font-size: 11px; font-family: 'Space Mono', monospace; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 2px; }
  .link-label { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
  .x-badge { display: inline-block; background: var(--gold); color: var(--bg); font-size: 9px; font-family: 'Space Mono', monospace; font-weight: 700; letter-spacing: 0.08em; padding: 2px 7px; border-radius: 20px; margin-left: 8px; vertical-align: middle; animation: pulse 2s infinite; }
  .arrow { color: var(--muted); font-size: 18px; transition: transform 0.2s, color 0.2s; flex-shrink: 0; }
  .link-card:hover .arrow { transform: translateX(3px); color: var(--gold); }
  .link-card.soon { opacity: 0.4 !important; cursor: default; pointer-events: none; }
  .soon-badge { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--muted); border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px; }
  .footer { margin-top: 40px; text-align: center; font-family: 'Space Mono', monospace; font-size: 10px; color: #2a2e3d; letter-spacing: 0.1em; animation: fadeIn 1s 1.2s ease both; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.4); } 50% { box-shadow: 0 0 0 5px rgba(201,168,76,0); } }
  .links .link-card:nth-child(1) { animation-delay: 0.35s; }
  .links .link-card:nth-child(2) { animation-delay: 0.45s; }
  .links .link-card:nth-child(3) { animation-delay: 0.55s; }
  .links .link-card:nth-child(4) { animation-delay: 0.65s; }
  .links .link-card:nth-child(5) { animation-delay: 0.75s; }
  .links .link-card:nth-child(6) { animation-delay: 0.85s; }
</style>
